<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动态解谜游戏 (Dynamic Puzzle Game) - Remastered</title>
    <style>
        /* --- 1. Global Reset & Theme --- */
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=ZCOOL+QingKe+HuangYou&display=swap');

        * {
            box-sizing: border-box;
        }

        :root {
            --primary-color: #fca311;
            --primary-hover: #ffb703;
            --dark-bg: rgba(22, 33, 62, 0.85); /* Glassmorphism base */
            --darker-bg: #0f172a; 
            --text-main: #f8fafc;
            --danger: #ef4444;
            --success: #22c55e;
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            --glass-border: 1px solid rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Quicksand', 'ZCOOL QingKe HuangYou', sans-serif;
            background: radial-gradient(circle at top left, #1e293b, var(--darker-bg));
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        /* --- 2. Layout & Containers --- */
        .game-wrapper {
            width: 100vw;
            height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .screen, .game-container, .hard-mode-container {
            width: 100%;
            max-width: 900px;
            height: auto;
            min-height: 80vh;
            background: var(--dark-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: var(--glass-border);
            border-radius: 20px;
            box-shadow: var(--glass-shadow);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            position: absolute;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .game-container, .hard-mode-container {
            display: none; /* Initially hidden */
            padding: 40px;
        }

        .level {
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: absolute;
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            transition: all 0.5s ease-in-out;
        }

        .level.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
            position: relative;
        }

        /* --- 3. Typography & Buttons --- */
        h1, h2, h3 {
            color: var(--primary-color);
            margin: 0 0 15px 0;
            letter-spacing: 2px;
            text-shadow: 0 4px 15px rgba(252, 163, 17, 0.4);
        }

        #start-screen h1 { font-size: 3.5em; margin-bottom: 30px; }
        #start-screen h1 span { cursor: pointer; display: inline-block; transition: transform 0.2s; }
        #start-screen h1 span:hover { transform: scale(1.1) translateY(-5px); }

        p { font-size: 1.2em; line-height: 1.6; max-width: 90%; margin-bottom: 20px; color: #cbd5e1; }

        button, input[type="text"] {
            padding: 12px 25px;
            font-size: 1.1em;
            border-radius: 12px;
            border: 2px solid var(--primary-color);
            background: transparent;
            color: var(--primary-color);
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 1px;
            outline: none;
        }

        button:hover:not(:disabled) {
            background-color: var(--primary-color);
            color: var(--darker-bg);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(252, 163, 17, 0.3);
        }

        button:disabled {
            border-color: #475569;
            color: #475569;
            cursor: not-allowed;
        }

        input[type="text"] {
            background: rgba(0,0,0,0.2);
            color: white;
            text-align: center;
        }

        #start-screen button, .win-buttons button { width: 220px; font-size: 1.3em; margin: 5px; }

        #lang-switcher { position: absolute; top: 20px; right: 20px; z-index: 100; display: flex; gap: 5px; }
        #lang-switcher button { padding: 6px 12px; font-size: 0.9em; border-radius: 8px; }
        #lang-switcher button.active { background-color: var(--primary-color); color: var(--darker-bg); }

        /* --- 4. Global Animations & Utilities --- */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
        .shake { animation: shake 0.5s; }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .pop-in { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        .hidden-element { display: none !important; }

        .message-box {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary-color);
            color: var(--darker-bg);
            font-weight: bold;
            padding: 12px 25px;
            border-radius: 30px;
            opacity: 0;
            transition: opacity 0.4s;
            pointer-events: none;
            z-index: 999;
            box-shadow: 0 4px 15px rgba(252, 163, 17, 0.5);
        }
        .message-box.show { opacity: 1; }

        /* --- 5. Level Specific Styles --- */
        /* Level 1: Stars */
        #level-1-space { width: 100%; height: 300px; position: relative; border-radius: 15px; background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%); overflow: hidden; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); }
        .star { position: absolute; background-color: white; border-radius: 50%; animation: twinkle 2s infinite ease-in-out; }
        .special-star { cursor: pointer; animation: special-twinkle 0.8s infinite ease-in-out; box-shadow: 0 0 10px var(--primary-color); }
        @keyframes twinkle { 50% { opacity: 0.3; } }
        @keyframes special-twinkle { 50% { transform: scale(1.8); opacity: 0.9; } }

        /* Level 2: Clock */
        #clock-container { width: 220px; height: 220px; border: 8px solid #8d6e63; border-radius: 50%; position: relative; background: radial-gradient(circle, #efebe9, #d7ccc8); box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        #hour-hand, #minute-hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom; background-color: #3e2723; border-radius: 4px; transition: transform 0.3s cubic-bezier(0.4, 2.5, 0.3, 1); }
        #hour-hand { width: 8px; height: 55px; }
        #minute-hand { width: 4px; height: 80px; }
        #clock-controls { margin-top: 25px; display: flex; gap: 10px; }
        #time-display { font-size: 2em; color: var(--primary-color); margin-top: 15px; font-weight: bold; font-family: monospace; }

        /* Level 3: Garden */
        #garden { display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; margin-top: 20px; }
        .flower { width: 80px; height: 80px; border-radius: 50%; cursor: pointer; transition: transform 0.3s, box-shadow 0.3s; border: 3px solid rgba(255,255,255,0.2); }
        .flower:hover { transform: scale(1.15) translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }

        /* Level 4: Maze */
        #maze-container { display: grid; grid-template-columns: repeat(5, 45px); grid-template-rows: repeat(5, 45px); border: 3px solid var(--primary-color); border-radius: 8px; overflow: hidden; }
        .maze-cell { width: 45px; height: 45px; background-color: rgba(0,0,0,0.3); transition: background-color 0.2s; }
        .maze-wall { background-color: #4a4e69; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        .maze-player { background-color: var(--primary-color); border-radius: 50%; box-shadow: 0 0 10px var(--primary-color); transform: scale(0.8); }
        #maze-controls { margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        #maze-controls .d-pad-row { display: flex; gap: 8px; }
        .maze-btn { width: 55px; height: 55px; font-size: 1.5em; padding: 0; display: flex; justify-content: center; align-items: center; border-radius: 15px; }

        /* Level 5: Book */
        #level-5 { transition: background-color 0.8s; border-radius: 20px; }
        #level-5.dark { background-color: #000; box-shadow: inset 0 0 50px rgba(0,0,0,1); }
        #light-switch { width: 60px; height: 60px; border-radius: 50%; position: absolute; top: 20px; right: 20px; cursor: pointer; background: radial-gradient(circle, #ffff00, #ffb703); border: 3px solid var(--primary-color); box-shadow: 0 0 20px #ffff00; transition: all 0.4s; }
        #level-5.dark #light-switch { background: radial-gradient(circle, #6c757d, #495057); border-color: #343a40; box-shadow: none; }
        #book { width: 160px; height: 220px; background: linear-gradient(135deg, #8d6e63, #5d4037); border-radius: 5px 15px 15px 5px; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 3em; color: #efebe9; box-shadow: -5px 0 15px rgba(0,0,0,0.5); position: relative; }
        #book::before { content: ''; position: absolute; left: 10px; top: 0; bottom: 0; width: 2px; background: rgba(0,0,0,0.2); }
        #book-clue { color: var(--primary-color); font-size: 3.5em; letter-spacing: 5px; text-shadow: 0 0 15px var(--primary-color); }

        /* Level 6: Door */
        #door { width: 160px; height: 260px; background: linear-gradient(to bottom, #5d4037, #3e2723); border: 12px solid #271611; border-radius: 10px 10px 0 0; margin-bottom: 25px; position: relative; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); }
        #door::after { content: ''; position: absolute; right: 20px; top: 50%; width: 15px; height: 15px; background: #ffb703; border-radius: 50%; box-shadow: 0 0 5px #ffb703; }

        /* Level 7: Drag & Drop Fragments (NEW) */
        #level-7-workspace { display: flex; flex-direction: column; align-items: center; gap: 30px; width: 100%; margin-top: 20px; }
        #fragment-drop-zone { width: 340px; height: 90px; border: 3px dashed var(--primary-color); border-radius: 15px; display: flex; justify-content: center; align-items: center; gap: 10px; background-color: rgba(0,0,0,0.2); transition: all 0.3s ease; }
        #fragment-drop-zone.drag-over { background-color: rgba(252, 163, 17, 0.2); transform: scale(1.05); border-style: solid; box-shadow: 0 0 15px rgba(252,163,17,0.4); }
        #fragments-container { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        .fragment { width: 60px; height: 60px; background: linear-gradient(135deg, #adb5bd, #6c757d); border: 2px solid #495057; border-radius: 10px; cursor: grab; display: flex; justify-content: center; align-items: center; font-size: 1.8em; font-weight: bold; color: #212529; box-shadow: 0 5px 10px rgba(0,0,0,0.3); transition: transform 0.2s; }
        .fragment:active { cursor: grabbing; }
        .fragment.dragging { opacity: 0.4; transform: scale(0.8); }
        .fragment.correct { background: var(--primary-color); color: #fff; border-color: #fff; cursor: default; box-shadow: 0 0 15px var(--primary-color); }

        /* Level 8: Draw Canvas */
        #wall-canvas { width: 400px; height: 300px; background: #2b2b2b; border-radius: 12px; cursor: crosshair; position: relative; box-shadow: inset 0 0 20px #000; border: 2px solid #555; }
        .star-point { position: absolute; width: 18px; height: 18px; background-color: rgba(255, 255, 255, 0.3); border-radius: 50%; cursor: pointer; transition: background-color 0.3s, transform 0.2s; }
        .star-point:hover { transform: scale(1.2); }
        .star-point.clicked { background-color: var(--primary-color); box-shadow: 0 0 10px var(--primary-color); }

        /* Level 9: Map */
        #map-container { width: 100%; max-width: 600px; height: 350px; background-image: url('https://placehold.co/720x480/A98B74/3E2723?text=古老的藏宝图'); background-size: cover; background-position: center; border: 6px solid #5d4037; border-radius: 15px; cursor: crosshair; position: relative; box-shadow: 0 15px 30px rgba(0,0,0,0.6); }
        #treasure-spot { position: absolute; width: 40px; height: 40px; background-color: transparent; border-radius: 50%; }
        #chest-image { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100px; height: 100px; background: linear-gradient(135deg, var(--primary-color), #e85d04); border: 4px solid #fff; border-radius: 15px; display: flex; justify-content: center; align-items: center; font-size: 3.5em; animation: popIn 0.5s ease-out; box-shadow: 0 0 30px var(--primary-color); }

        /* Level 10: Final Chest */
        #final-chest { width: 220px; height: 160px; background: linear-gradient(to bottom, #a67c52, #8b5a2b); border: 12px solid #4a2e15; border-radius: 15px; margin-bottom: 30px; box-shadow: 0 15px 25px rgba(0,0,0,0.5); position: relative; }
        #final-chest::before { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 20px; background: #333; border: 3px solid #fca311; border-radius: 5px; }
        #final-buttons { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        .final-button { width: 65px; height: 65px; font-size: 2.2em; display: flex; justify-content: center; align-items: center; border-radius: 50%; border: 3px solid rgba(255,255,255,0.3); box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: transform 0.1s; padding: 0; }

        /* --- 6. Hard Mode Specifics --- */
        #hard-level-select-container, #god-mode-select-container { border-top: 1px solid rgba(255,255,255,0.2); margin-top: 30px; padding-top: 20px; display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; width: 100%; }
        #hard-level-select-container button, #god-mode-select-container button { width: auto; font-size: 1em; padding: 8px 18px; border-radius: 20px; }
        #tetris-game-area { display: flex; gap: 30px; align-items: flex-start; justify-content: center; }
        #tetris-canvas { background-color: rgba(0,0,0,0.5); border: 3px solid var(--primary-color); border-radius: 8px; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        #next-piece-canvas, #hold-piece-canvas { background-color: rgba(0,0,0,0.3); border: 2px solid #555; border-radius: 5px; margin-bottom: 15px; }
        #tetris-info p { font-size: 1.3em; margin: 10px 0; }
        #tetris-controls { display: flex; flex-direction: column; align-items: center; gap: 8px; margin-top: 20px; }
        .tetris-btn { width: 65px; height: 65px; font-size: 2em; padding: 0; border-radius: 15px; }
        #hard-level-2-options, #hard-level-5-options { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        .color-option-btn { width: 90px; height: 90px; border-radius: 15px; border: 3px solid rgba(255,255,255,0.2); transition: transform 0.2s; }
        .color-option-btn:hover { transform: scale(1.1); border-color: #fff; }
        #jigsaw-board { display: grid; border: 3px solid var(--primary-color); background-color: rgba(0,0,0,0.5); padding: 5px; border-radius: 8px; gap: 2px; }
        .jigsaw-slot { border: 1px dashed rgba(255,255,255,0.3); box-sizing: border-box; border-radius: 4px; }
        .jigsaw-slot.dropped { border: none; }
        #jigsaw-pieces { display: flex; flex-wrap: wrap; gap: 8px; border: 2px solid rgba(255,255,255,0.2); padding: 15px; min-height: 120px; margin-top: 20px; justify-content: center; border-radius: 8px; background: rgba(0,0,0,0.2); }
        .jigsaw-piece { cursor: grab; border-radius: 4px; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        #bubble-shooter-canvas { border: 3px solid var(--primary-color); border-radius: 10px; cursor: crosshair; }
        #reaction-box { width: 100%; max-width: 500px; height: 350px; background-color: rgba(0,0,0,0.4); border: 3px solid var(--primary-color); border-radius: 12px; position: relative; cursor: crosshair; overflow: hidden; }
        #reaction-countdown { font-size: 6em; color: var(--primary-color); position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; text-shadow: 0 0 20px #000; }
        #luck-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-top: 20px; }
        .luck-btn { width: 70px; height: 70px; font-size: 1.8em; border-radius: 15px; }

        /* --- Responsive Queries --- */
        @media (max-width: 768px) {
            .screen, .game-container, .hard-mode-container { padding: 25px; }
            #start-screen h1 { font-size: 2.8em; }
            #tetris-game-area { flex-direction: column; align-items: center; gap: 15px; }
            #tetris-info { display: flex; gap: 15px; align-items: flex-end; }
        }

        @media (max-width: 480px) {
            #start-screen h1 { font-size: 2.2em; }
            button, .win-buttons button { width: 100%; max-width: 250px; }
            #maze-container { grid-template-columns: repeat(5, 35px); grid-template-rows: repeat(5, 35px); }
            .maze-cell { width: 35px; height: 35px; }
            .maze-btn, .tetris-btn, .luck-btn { width: 50px; height: 50px; font-size: 1.3em; }
            #fragment-drop-zone { width: 100%; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
        <div id="start-screen" class="screen">
            <h1 id="game-title" data-lang-key="game_title"></h1>
            <button id="continue-btn" data-lang-key="continue_btn">继续游戏</button>
            <button id="new-game-btn" data-lang-key="new_game_btn">新游戏</button>
            <button id="start-challenge-btn" data-lang-key="challenge_btn" class="hidden-element"></button>
            
            <div id="hard-level-select-container" class="hidden-element">
                 <h3 data-lang-key="select_level_title">选择挑战关卡</h3>
                 <button class="level-select-btn" data-level="1" data-lang-key="hl1_title"></button>
                 <button class="level-select-btn" data-level="3" data-lang-key="hl3_title"></button>
                 <button class="level-select-btn" data-level="4" data-lang-key="hl4_title"></button>
                 <button class="level-select-btn" data-level="6" data-lang-key="hl6_title"></button>
                 <button class="level-select-btn" data-level="7" data-lang-key="hl7_title"></button>
            </div>
            
            <div id="god-mode-select-container" class="hidden-element">
                 <h3>God Mode: Select Level</h3>
                 <div id="god-main-levels"></div>
                 <div id="god-hard-levels"></div>
            </div>
        </div>

        <div class="game-container">
            <div id="lang-switcher">
                <button id="lang-zh" class="active">中文</button>
                <button id="lang-en">EN</button>
            </div>
            
            <div id="level-1" class="level"> 
                <h2 data-lang-key="l1_title"></h2> 
                <p data-lang-key="l1_desc"></p> 
                <div id="level-1-space"></div> 
                <button id="l1-next-btn" class="hidden-element" data-lang-key="l1_next_btn"></button> 
            </div>
            
            <div id="level-2" class="level"> 
                <h2 data-lang-key="l2_title"></h2> 
                <p data-lang-key="l2_desc"></p> 
                <div id="clock-container"> 
                    <div id="hour-hand"></div> 
                    <div id="minute-hand"></div> 
                </div> 
                <div id="time-display">12 : 00</div> 
                <div id="clock-controls"> 
                    <button id="hour-up-btn" data-lang-key="hour_up_btn"></button> 
                    <button id="hour-down-btn" data-lang-key="hour_down_btn"></button> 
                </div> 
                <div id="l2-clue" class="hidden-element"> 
                    <p data-lang-key="l2_clue_text"></p> 
                    <button id="l2-next-btn" data-lang-key="l2_next_btn"></button> 
                </div> 
            </div>
            
            <div id="level-3" class="level"> 
                <h2 data-lang-key="l3_title"></h2> 
                <p data-lang-key="l3_desc"></p> 
                <div id="garden"> 
                    <div class="flower" data-color="red" style="background-color: #d90429;"></div> 
                    <div class="flower" data-color="blue" style="background-color: #0077b6;"></div> 
                    <div class="flower" data-color="yellow" style="background-color: #ffbe0b;"></div> 
                    <div class="flower" data-color="purple" style="background-color: #8338ec;"></div> 
                </div> 
                <div id="l3-clue" class="hidden-element"> 
                    <p data-lang-key="l3_clue_text"></p> 
                    <button id="l3-next-btn" data-lang-key="l3_next_btn"></button> 
                </div> 
            </div>
            
            <div id="level-4" class="level"> 
                <h2 data-lang-key="l4_title"></h2> 
                <p data-lang-key="l4_desc"></p> 
                <div id="maze-container"></div> 
                <div id="maze-controls"> 
                    <div class="d-pad-row"> <button class="maze-btn" id="maze-up">↑</button> </div> 
                    <div class="d-pad-row"> 
                        <button class="maze-btn" id="maze-left">←</button> 
                        <button class="maze-btn" id="maze-down">↓</button> 
                        <button class="maze-btn" id="maze-right">→</button> 
                    </div> 
                </div> 
                <div id="l4-clue" class="hidden-element"> 
                    <p data-lang-key="l4_clue_text"></p> 
                    <button id="l4-next-btn" data-lang-key="l4_next_btn"></button> 
                </div> 
            </div>
            
            <div id="level-5" class="level"> 
                <div id="light-switch"></div> 
                <h2 data-lang-key="l5_title"></h2> 
                <p data-lang-key="l5_desc"></p> 
                <div id="book">📖</div> 
                <div id="l5-clue" class="hidden-element"> 
                    <p data-lang-key="l5_clue_text"></p> 
                    <h3 id="book-clue"></h3> 
                    <button id="l5-next-btn" class="hidden-element" data-lang-key="l5_next_btn"></button> 
                </div> 
            </div>
            
            <div id="level-6" class="level"> 
                <h2 data-lang-key="l6_title"></h2> 
                <p data-lang-key="l6_desc"></p> 
                <div id="door"></div> 
                <div> 
                    <input type="text" id="password-input"> 
                    <button id="submit-password-btn" data-lang-key="submit_password_btn"></button> 
                </div> 
            </div>
            
            <div id="level-7" class="level"> 
                <h2 data-lang-key="l7_title"></h2> 
                <p data-lang-key="l7_desc"></p> 
                
                <div id="level-7-workspace">
                    <div id="fragment-drop-zone"></div>
                    <div id="fragments-container"></div>
                </div>
                
                <div id="l7-clue" class="hidden-element"> 
                    <p data-lang-key="l7_clue_text"></p> 
                    <button id="l7-next-btn" data-lang-key="l7_next_btn"></button> 
                </div> 
            </div>

            // --- 3. Core Functions ---
            function shuffle(array) {
                const newArray = [...array];
                for (let i = newArray.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
                }
                return newArray;
            }

            function setupGame() {
                const clues = {};
                clues.number = Math.floor(Math.random() * 4) + 3; // 3 to 6
                const colors = ['red', 'blue', 'yellow'];
                clues.color = colors[Math.floor(Math.random() * colors.length)];

                const Dirs = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'];
                const DirSymbols = {'ArrowUp': '↑', 'ArrowDown': '↓', 'ArrowLeft': '←', 'ArrowRight': '→'};
                clues.directions = Array(4).fill(0).map(() => Dirs[Math.floor(Math.random() * Dirs.length)]);
                clues.directionSymbols = clues.directions.map(d => DirSymbols[d]).join(' ');

                const passwords = ['OPEN', 'MAGIC', 'SECRET', 'LIGHT'];
                clues.password = passwords[Math.floor(Math.random() * passwords.length)];
                clues.fragmentOrder = shuffle([0, 1, 2, 3, 4]);

                const gridCellSize = 50;
                const gridWidth = 400 / gridCellSize;
                const gridHeight = 300 / gridCellSize;
                clues.coords = {
                    x: (Math.floor(Math.random() * (gridWidth - 2)) + 1) * gridCellSize,
                    y: (Math.floor(Math.random() * (gridHeight - 2)) + 1) * gridCellSize,
                };
                clues.finalSequence = ['star', 'gem', 'book', 'key'];
                gameState.clues = clues;
            }

            function getText(key, ...args) {
                let text = translations[currentLang][key] || key;
                args.forEach((arg) => {
                    if (typeof arg === 'object' && arg !== null) {
                        Object.keys(arg).forEach(k => {
                           text = text.replace(`{VAR_${k.toUpperCase()}}`, arg[k]);
                        });
                    } else {
                       text = text.replace('{VAR}', arg);
                    }
                });
                return text;
            }

            function switchLanguage(lang) {
                currentLang = lang;
                document.querySelectorAll('[data-lang-key]').forEach(el => {
                    const key = el.getAttribute('data-lang-key');
                    if(el.id === 'game-title') return;

                    let text = translations[lang][key] || '';

                    if (gameState.clues && Object.keys(gameState.clues).length > 0) {
                        if (key === 'l1_desc' || key === 'l1_msg_found') {
                            text = text.replace('{VAR}', gameState.clues.number);
                        } else if (key === 'l2_clue_text') {
                            const colorName = translations[lang].colors[gameState.clues.color];
                            text = text.replace('{VAR}', colorName);
                        } else if (key === 'l3_clue_text') {
                            text = text.replace('{VAR}', gameState.clues.directionSymbols);
                        } else if (key === 'l8_clue_text') {
                            text = text.replace('{VAR_X}', gameState.clues.coords.x).replace('{VAR_Y}', gameState.clues.coords.y);
                        } else if (key === 'l9_msg_wrong_spot') {
                           text = '';
                        }
                    }

                    if (hardGameState.data && Object.keys(hardGameState.data).length > 0) {
                         if (key === 'hl2_desc') {
                            text = text.replace('{VAR}', hardGameState.data.memoryQuestionNumber || '?');
                        }
                    }

                    if (el.tagName === 'INPUT') {
                        el.placeholder = text;
                    } else {
                        const scoreSpan = el.querySelector('span');
                        if (scoreSpan && text.includes(':')) {
                            const newText = text.split(':')[0];
                            el.firstChild.textContent = newText + ': ';
                        } else {
                            el.innerHTML = text;
                        }
                    }
                });
                document.getElementById('lang-zh').classList.toggle('active', lang === 'zh');
                document.getElementById('lang-en').classList.toggle('active', lang === 'en');
            }

            function showMessage(key, duration = 2500, ...args) {
                messageBox.textContent = getText(key, ...args);
                messageBox.classList.add('show');
                // Optional: Add pop-in animation to messages
                messageBox.classList.add('pop-in');
                setTimeout(() => {
                    messageBox.classList.remove('show', 'pop-in');
                }, duration);
            }

            function saveGame() {
                localStorage.setItem('puzzleGameState', JSON.stringify(gameState));
            }

            function goToLevel(levelNumber) {
                document.querySelectorAll('.game-container .level').forEach(level => level.classList.remove('active'));

                let nextLevel;
                if (levelNumber === 'win') {
                    nextLevel = document.getElementById('win-screen');
                    localStorage.removeItem('puzzleGameState');
                    localStorage.setItem('mainGameCompleted', 'true');
                } else {
                    gameState.currentLevel = levelNumber;
                    nextLevel = document.getElementById(`level-${levelNumber}`);
                    saveGame();
                }

                if (nextLevel) {
                    nextLevel.classList.add('active');
                }
                const initFunction = window[`initLevel${levelNumber}`];
                if (typeof initFunction === 'function') {
                    initFunction();
                }
                switchLanguage(currentLang);
            }

            // --- 🌟 LEVEL 7 REMASTERED: Drag & Drop Logic 🌟 ---
            window.initLevel7 = function() {
                const workspace = document.getElementById('level-7-workspace');
                const container = document.getElementById('fragments-container');
                const dropZone = document.getElementById('fragment-drop-zone');
                
                // Clear state
                container.innerHTML = '';
                dropZone.innerHTML = '';
                
                const correctOrder = gameState.clues.fragmentOrder;
                let droppedOrder = [];
                
                // Generate Fragments
                function createFragments() {
                    container.innerHTML = '';
                    const fragments = Array(5).fill(0).map((_, i) => {
                        const frag = document.createElement('div');
                        frag.className = 'fragment';
                        frag.textContent = i + 1;
                        frag.dataset.id = i;
                        frag.draggable = true; // Make HTML5 Draggable
                        
                        // Drag Start
                        frag.addEventListener('dragstart', (e) => {
                            e.dataTransfer.setData('text/plain', frag.dataset.id);
                            setTimeout(() => frag.classList.add('dragging'), 0);
                        });
                        
                        // Drag End
                        frag.addEventListener('dragend', () => {
                            frag.classList.remove('dragging');
                        });
                        return frag;
                    });
                    
                    shuffle(fragments).forEach(f => container.appendChild(f));
                }
                
                createFragments();
                
                // Drop Zone Setup
                dropZone.ondragover = (e) => {
                    e.preventDefault(); 
                    dropZone.classList.add('drag-over');
                };
                
                dropZone.ondragleave = () => {
                    dropZone.classList.remove('drag-over');
                };
                
                dropZone.ondrop = (e) => {
                    e.preventDefault();
                    dropZone.classList.remove('drag-over');
                    
                    const fragId = e.dataTransfer.getData('text/plain');
                    if (!fragId) return; 
                    
                    const draggedFrag = document.querySelector(`.fragment[data-id="${fragId}"]`);
                    
                    if (draggedFrag && draggedFrag.parentElement === container) {
                        // Check if sequence is correct
                        if (parseInt(fragId) === correctOrder[droppedOrder.length]) {
                            // Correct!
                            droppedOrder.push(parseInt(fragId));
                            draggedFrag.classList.add('correct');
                            draggedFrag.draggable = false; 
                            dropZone.appendChild(draggedFrag); 
                            
                            if (droppedOrder.length === correctOrder.length) {
                                showMessage('l7_msg_star_complete');
                                const clue = document.getElementById('l7-clue');
                                clue.classList.remove('hidden-element');
                                clue.classList.add('pop-in'); 
                            }
                        } else {
                            // Wrong! Trigger shake
                            showMessage('l7_msg_wrong_order');
                            workspace.classList.add('shake');
                            setTimeout(() => workspace.classList.remove('shake'), 500);
                            
                            droppedOrder = [];
                            dropZone.innerHTML = '';
                            createFragments(); 
                        }
                    }
                };
            }

            window.initHardLevel1 = function() { 
                const canvas = document.getElementById('tetris-canvas');
                const context = canvas.getContext('2d');
                const scoreElement = document.getElementById('tetris-score');
                const comboElement = document.getElementById('tetris-combo');
                const nextCanvas = document.getElementById('next-piece-canvas');
                const nextContext = nextCanvas.getContext('2d');
                const holdCanvas = document.getElementById('hold-piece-canvas');
                const holdContext = holdCanvas.getContext('2d');
                const COLS = 10, ROWS = 20, BLOCK_SIZE = 20;

                context.resetTransform(); context.scale(BLOCK_SIZE, BLOCK_SIZE);
                nextContext.resetTransform(); nextContext.scale(BLOCK_SIZE, BLOCK_SIZE);
                holdContext.resetTransform(); holdContext.scale(BLOCK_SIZE, BLOCK_SIZE);

                let score = 0, combo = 0;
                let board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
                hardGameState.data.tetrisHistory = [];

                const SHAPES = [
                    { shape: [[1,1,1,1]], color: 'cyan' },
                    { shape: [[1,1],[1,1]], color: 'yellow' },
                    { shape: [[0,1,0],[1,1,1]], color: 'purple' },
                    { shape: [[1,1,0],[0,1,1]], color: 'green' },
                    { shape: [[0,1,1],[1,1,0]], color: 'red' },
                    { shape: [[1,0,0],[1,1,1]], color: 'blue' },
                    { shape: [[0,0,1],[1,1,1]], color: 'orange' } 
                ];

                let piece = null, nextPiece = null, heldPiece = null, canHold = true;
                let dropCounter = 0, dropInterval = 1000, lastTime = 0;
                let animationFrameId;

                function createPiece() {
                    const typeId = Math.floor(Math.random() * SHAPES.length);
                    const {shape, color} = SHAPES[typeId];
                    return { x: Math.floor(COLS / 2) - Math.floor(shape[0].length / 2), y: 0, shape: shape, color: color };
                }

                function newPiece() {
                    piece = nextPiece || createPiece();
                    nextPiece = createPiece();
                    hardGameState.data.tetrisHistory.push(piece.color);
                    drawNextPiece();
                    if (collide(board, piece)) {
                        cancelAnimationFrame(animationFrameId);
                        goToHardGameOver(hardGameState.isSingleLevelMode);
                    }
                }

                function draw() {
                    context.fillStyle = 'rgba(0,0,0,0.5)';
                    context.fillRect(0, 0, COLS, ROWS);
                    drawMatrix(context, board, {x: 0, y: 0}, '#555');
                    if(piece) {
                        const ghostPiece = { ...piece };
                        while (!collide(board, ghostPiece)) { ghostPiece.y++; }
                        ghostPiece.y--;
                        drawMatrix(context, ghostPiece.shape, ghostPiece, 'rgba(255, 255, 255, 0.2)');
                        drawMatrix(context, piece.shape, piece, piece.color);
                    }
                }

                function drawNextPiece() {
                    nextContext.clearRect(0, 0, 4, 4);
                    if (nextPiece) {
                        const offset = { x: (4 - nextPiece.shape[0].length) / 2, y: (4 - nextPiece.shape.length) / 2 };
                        drawMatrix(nextContext, nextPiece.shape, offset, nextPiece.color);
                    }
                }
                 function drawHeldPiece() {
                    holdContext.clearRect(0, 0, 4, 4);
                    if (heldPiece) {
                        const offset = { x: (4 - heldPiece.shape[0].length) / 2, y: (4 - heldPiece.shape.length) / 2 };
                        drawMatrix(holdContext, heldPiece.shape, offset, heldPiece.color);
                    }
                }

                function drawMatrix(ctx, matrix, offset, color) {
                    ctx.fillStyle = color;
                    matrix.forEach((row, y) => {
                        row.forEach((value, x) => {
                            if (value !== 0) {
                                ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                                ctx.strokeStyle = 'rgba(0,0,0,0.5)';
                                ctx.lineWidth = 0.05;
                                ctx.strokeRect(x + offset.x, y + offset.y, 1, 1);
                            }
                        });
                    });
                }

                function collide(board, piece) {
                    const { shape, x, y } = piece;
                    for (let row = 0; row < shape.length; row++) {
                        for (let col = 0; col < shape[row].length; col++) {
                            if (shape[row][col] && ( (board[row + y] && board[row + y][col + x]) !== 0 || (row + y) >= ROWS) ) {
                                return true;
                            }
                        }
                    }
                    return false;
                }

                function merge(board, piece) {
                    piece.shape.forEach((row, y) => {
                        row.forEach((value, x) => {
                            if (value !== 0) {
                                board[y + piece.y][x + piece.x] = 1;
                            }
                        });
                    });
                }

                function rotate(matrix) {
                    const result = [];
                    for (let i = 0; i < matrix[0].length; i++) {
                        const row = matrix.map(e => e[i]).reverse();
                        result.push(row);
                    }
                    return result;
                }

                function pieceRotate() {
                    if (!piece) return;
                    const rotated = rotate(piece.shape);
                    let offset = 1;
                    const pos = piece.x;
                    while(collide(board, { ...piece, shape: rotated })) {
                        piece.x += offset;
                        offset = -(offset + (offset > 0 ? 1 : -1));
                        if(offset > rotated[0].length + 1) {
                            piece.x = pos; 
                            return;
                        }
                    }
                    piece.shape = rotated;
                }

                function pieceDrop() {
                    if (!piece) return;
                    piece.y++;
                    if (collide(board, piece)) {
                        piece.y--;
                        merge(board, piece);
                        sweep();
                        newPiece();
                        canHold = true;
                    }
                    dropCounter = 0;
                }

                function pieceHardDrop() {
                    if (!piece) return;
                    while (!collide(board, piece)) { piece.y++; }
                    piece.y--;
                    merge(board, piece);
                    sweep();
                    newPiece();
                    canHold = true;
                    dropCounter = 0;
                }

                function holdPiece() {
                    if (!canHold) return;
                    if (heldPiece) {
                        [piece, heldPiece] = [heldPiece, piece];
                        piece.x = Math.floor(COLS / 2) - Math.floor(piece.shape[0].length / 2);
                        piece.y = 0;
                    } else {
                        heldPiece = piece;
                        newPiece();
                    }
                    canHold = false;
                    drawHeldPiece();
                }

                function pieceMove(dir) {
                    if (!piece) return;
                    piece.x += dir;
                    if (collide(board, piece)) { piece.x -= dir; }
                }

                function sweep() {
                    let clearedLines = 0;
                    outer: for (let y = board.length - 1; y > 0; --y) {
                        for (let x = 0; x < board[y].length; ++x) {
                            if (board[y][x] === 0) { continue outer; }
                        }
                        const row = board.splice(y, 1)[0].fill(0);
                        board.unshift(row);
                        ++y;
                        clearedLines++;
                    }
                    if (clearedLines > 0) {
                        let baseScore = clearedLines === 4 ? 5 : clearedLines;
                        score += baseScore + combo;
                        combo++;
                    } else {
                        combo = 0;
                    }
                }

                function update(time = 0) {
                    const deltaTime = time - lastTime;
                    lastTime = time;
                    dropCounter += deltaTime;
                    if (dropCounter > dropInterval) { pieceDrop(); }
                    draw();
                    if(scoreElement) scoreElement.textContent = score;
                    if(comboElement) comboElement.textContent = combo;
                    if (score >= 50) {
                        cancelAnimationFrame(animationFrameId);
                        if (hardGameState.isSingleLevelMode) { goToHardGameOver(true); } 
                        else { goToHardLevel(2); }
                        return;
                    }
                    animationFrameId = requestAnimationFrame(update);
                }

                const handleTetrisKey = (e) => {
                    if (!document.getElementById('hard-level-1').classList.contains('active')) return;
                    if (e.code === 'ArrowLeft') pieceMove(-1);
                    else if (e.code === 'ArrowRight') pieceMove(1);
                    else if (e.code === 'ArrowDown') pieceDrop();
                    else if (e.code === 'ArrowUp') pieceRotate();
                    else if (e.code === 'Space') { e.preventDefault(); pieceHardDrop(); } 
                    else if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') { holdPiece(); }
                };

                document.addEventListener('keydown', handleTetrisKey);
                document.getElementById('tetris-left').onclick = () => pieceMove(-1);
                document.getElementById('tetris-right').onclick = () => pieceMove(1);
                document.getElementById('tetris-down').onclick = () => pieceDrop();
                document.getElementById('tetris-up').onclick = () => pieceRotate();
                document.getElementById('tetris-hard-drop').onclick = () => pieceHardDrop();
                document.getElementById('tetris-hold-btn').onclick = () => holdPiece();

                const observer = new MutationObserver(() => {
                    if (!document.getElementById('hard-level-1').classList.contains('active')) {
                        cancelAnimationFrame(animationFrameId);
                        document.removeEventListener('keydown', handleTetrisKey);
                        observer.disconnect();
                    }
                });
                observer.observe(document.getElementById('hard-level-1'), { attributes: true, subtree: false });

                newPiece();
                update();
            }

            window.initHardLevel2 = function() { 
                const optionsContainer = document.getElementById('hard-level-2-options');
                const questionElement = document.querySelector('#hard-level-2 p');
                optionsContainer.innerHTML = '';

                const questionIndex = Math.floor(Math.random() * 5); 
                const questionNumber = questionIndex + 1;
                hardGameState.data.memoryQuestionNumber = questionNumber;

                questionElement.innerHTML = getText('hl2_desc', questionNumber);

                const correctColor = hardGameState.data.tetrisHistory[questionIndex];
                const allColors = ['cyan', 'yellow', 'purple', 'green', 'red', 'blue', 'orange'];
                const distractors = shuffle(allColors.filter(c => c !== correctColor)).slice(0, 3);
                const options = shuffle([correctColor, ...distractors]);

                let chances = 2;

                options.forEach(color => {
                    const btn = document.createElement('button');
                    btn.className = 'color-option-btn';
                    btn.style.backgroundColor = color;
                    btn.onclick = () => {
                        if (color === correctColor) {
                            if (hardGameState.isSingleLevelMode) { goToHardGameOver(true); } 
                            else { goToHardLevel(3); }
                        } else {
                            chances--;
                            btn.disabled = true;
                            if (chances > 0) { showMessage("hl2_wrong_1_chance", 1500); } 
                            else { handleHardModeWrongAnswer(); }
                        }
                    };
                    optionsContainer.appendChild(btn);
                });
            };
            
            window.initHardLevel3 = function() { 
                const wrapper = document.getElementById('jigsaw-wrapper');
                wrapper.innerHTML = '<div id="jigsaw-board"></div><div id="jigsaw-pieces"></div>';
                const board = document.getElementById('jigsaw-board');
                const piecesContainer = document.getElementById('jigsaw-pieces');

                const size = 6;
                const pieceSize = 50;
                const totalSize = size * pieceSize;

                board.style.gridTemplateColumns = `repeat(${size}, ${pieceSize}px)`;
                board.style.gridTemplateRows = `repeat(${size}, ${pieceSize}px)`;
                piecesContainer.style.width = `${totalSize + (size -1) * 8 + 30}px`;

                const imgId = Math.floor(Math.random() * 1000);
                const imageUrl = `https://picsum.photos/${totalSize}?random=${imgId}`;

                const img = new Image();
                img.crossOrigin = "Anonymous";
                img.src = imageUrl;

                img.onload = () => {
                    let pieces = [];
                    let placedCount = 0;

                    for (let i = 0; i < size * size; i++) {
                        const slot = document.createElement('div');
                        slot.className = 'jigsaw-slot';
                        slot.dataset.index = i;
                        slot.style.width = `${pieceSize}px`;
                        slot.style.height = `${pieceSize}px`;
                        board.appendChild(slot);

                        const piece = document.createElement('div');
                        piece.className = 'jigsaw-piece';
                        piece.dataset.index = i;
                        piece.draggable = true;
                        piece.style.width = `${pieceSize}px`;
                        piece.style.height = `${pieceSize}px`;
                        piece.style.backgroundImage = `url('${imageUrl}')`;
                        const col = i % size;
                        const row = Math.floor(i / size);
                        piece.style.backgroundSize = `${totalSize}px ${totalSize}px`;
                        piece.style.backgroundPosition = `-${col * pieceSize}px -${row * pieceSize}px`;
                        pieces.push(piece);
                    }

                    shuffle(pieces).forEach(p => piecesContainer.appendChild(p));

                    let draggedPiece = null;

                    piecesContainer.addEventListener('dragstart', (e) => {
                        if (e.target.classList.contains('jigsaw-piece')) {
                            draggedPiece = e.target;
                            setTimeout(() => e.target.classList.add('dragging'), 0);
                        }
                    });

                    piecesContainer.addEventListener('dragend', (e) => {
                         if (e.target.classList.contains('jigsaw-piece')) {
                            e.target.classList.remove('dragging');
                            draggedPiece = null;
                         }
                    });

                    board.addEventListener('dragover', (e) => e.preventDefault());

                    board.addEventListener('drop', (e) => {
                        e.preventDefault();
                        if (e.target.classList.contains('jigsaw-slot') && !e.target.hasChildNodes()) {
                            if (draggedPiece && e.target.dataset.index === draggedPiece.dataset.index) {
                                e.target.appendChild(draggedPiece);
                                draggedPiece.draggable = false;
                                draggedPiece.style.cursor = 'default';
                                e.target.classList.add('dropped');
                                placedCount++;
                                if (placedCount === size * size) {
                                    if (hardGameState.isSingleLevelMode) { goToHardGameOver(true); } 
                                    else { setTimeout(() => goToHardLevel(4), 500); }
                                }
                            }
                        }
                    });
                };
            };
            
            window.initHardLevel4 = function() { 
                const canvas = document.getElementById('bubble-shooter-canvas');
                const ctx = canvas.getContext('2d');
                const colors = ['red', 'green', 'blue', 'yellow', 'purple'];
                hardGameState.data.bubbleShooterBg = colors[Math.floor(Math.random() * colors.length)];
                canvas.style.backgroundColor = hardGameState.data.bubbleShooterBg;
                ctx.fillStyle = 'white';
                ctx.font = '20px Quicksand';
                ctx.textAlign = 'center';
                ctx.fillText("Bubble Shooter - Auto Pass for Demo", canvas.width / 2, canvas.height / 2);
                setTimeout(() => { if (hardGameState.isSingleLevelMode) { goToHardGameOver(true); } else { goToHardLevel(5); } }, 2000);
            };
            
            window.initHardLevel5 = function() { 
                 const optionsContainer = document.getElementById('hard-level-5-options');
                optionsContainer.innerHTML = '';
                const correctColor = hardGameState.data.bubbleShooterBg;
                const allColors = ['red', 'green', 'blue', 'yellow', 'purple'];
                const distractors = shuffle(allColors.filter(c => c !== correctColor)).slice(0, 3);
                const options = shuffle([correctColor, ...distractors]);

                options.forEach(color => {
                    const btn = document.createElement('button');
                    btn.className = 'color-option-btn';
                    btn.style.backgroundColor = color;
                    btn.onclick = () => {
                        if (color === correctColor) {
                            if (hardGameState.isSingleLevelMode) { goToHardGameOver(true); } 
                            else { goToHardLevel(6); }
                        } else {
                            handleHardModeWrongAnswer();
                        }
                    };
                    optionsContainer.appendChild(btn);
                });
            };
            
            window.initHardLevel6 = function() { 
                const box = document.getElementById('reaction-box');
                const target = document.getElementById('reaction-target');
                const countdownEl = document.getElementById('reaction-countdown');
                const scoreEl = document.getElementById('reaction-score');
                const missesEl = document.getElementById('reaction-misses');
                let score = 0, misses = 0;
                let timeoutId;

                function startReactionGame() {
                    countdownEl.style.display = 'none';
                    showTarget();
                }

                function countdown(count) {
                    if (count > 0) {
                        countdownEl.textContent = count;
                        countdownEl.style.display = 'block';
                        setTimeout(() => countdown(count - 1), 1000);
                    } else {
                        startReactionGame();
                    }
                }

                function showTarget() {
                    const size = Math.floor(Math.random() * 31) + 30; 
                    target.style.width = `${size}px`;
                    target.style.height = `${size}px`;
                    target.style.backgroundColor = `hsl(${Math.random() * 360}, 90%, 60%)`;
                    target.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';

                    target.style.display = 'block';
                    target.style.top = `${Math.random() * (box.clientHeight - size)}px`;
                    target.style.left = `${Math.random() * (box.clientWidth - size)}px`;

                    timeoutId = setTimeout(() => {
                        misses++;
                        if(missesEl) missesEl.textContent = misses;
                        if (misses >= 2) {
                            clearTimeout(timeoutId);
                            goToHardGameOver(hardGameState.isSingleLevelMode);
                        } else {
                            showTarget();
                        }
                    }, 1200 - (score * 20)); 
                }

                target.onclick = () => {
                    score++;
                    if(scoreEl) scoreEl.textContent = score;
                    target.style.display = 'none';
                    clearTimeout(timeoutId);
                    if (score >= 20) {
                        if (hardGameState.isSingleLevelMode) { goToHardGameOver(true); } 
                        else { goToHardLevel(7); }
                    } else {
                        setTimeout(showTarget, Math.random() * 400 + 100); 
                    }
                };

                if(scoreEl) scoreEl.textContent = 0;
                if(missesEl) missesEl.textContent = 0;
                countdown(3);
            };
            
            window.initHardLevel7 = function() { 
                const grid = document.getElementById('luck-grid');
                grid.innerHTML = '';
                const luckyNumber = Math.ceil(Math.random() * 15);
                let chances = 2;

                for (let i = 1; i <= 15; i++) {
                    const btn = document.createElement('button');
                    btn.className = 'luck-btn';
                    btn.textContent = i;
                    btn.onclick = () => {
                        if (i === luckyNumber) {
                            if (hardGameState.isSingleLevelMode) { goToHardGameOver(true); } 
                            else { goToHardLevel(8); }
                        } else {
                            chances--;
                            btn.disabled = true;
                            if (chances <= 0) {
                                goToHardGameOver(hardGameState.isSingleLevelMode);
                            } else {
                                showMessage("不对，还有一次机会！", 1500);
                            }
                        }
                    };
                    grid.appendChild(btn);
                }
            };

            // --- Kickoff! ---
            initializeStartScreen();
        });
    </script>
